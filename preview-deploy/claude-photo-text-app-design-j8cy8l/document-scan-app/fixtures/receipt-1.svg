<svg width="800" height="1000" viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Photographed grocery receipt fixture">
	<title>Grocery Mart receipt (fixture)</title>
	<defs>
		<filter id="paperShadow" x="-20%" y="-20%" width="140%" height="140%">
			<feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.25" />
		</filter>
		<filter id="smudge" x="-20%" y="-20%" width="140%" height="140%">
			<feGaussianBlur stdDeviation="1.6" />
		</filter>
	</defs>

	<!-- tabletop background -->
	<rect x="0" y="0" width="800" height="1000" fill="#d6d6d9" />

	<!-- receipt paper -->
	<rect x="100" y="40" width="600" height="920" rx="4" fill="#fdfdfb" filter="url(#paperShadow)" />

	<g font-family="'Courier New', monospace" fill="#1a1a1a">
		<!-- title -->
		<text x="400" y="106" font-size="34" font-weight="700" text-anchor="middle">GROCERY MART</text>
		<!-- date -->
		<text x="400" y="144" font-size="18" text-anchor="middle" fill="#4a4a4a">2026-07-23</text>

		<line x1="150" y1="176" x2="650" y2="176" stroke="#c7c7c9" stroke-width="2" />

		<!-- items -->
		<text x="150" y="232" font-size="22">Milk 2% 1L          $3.49</text>

		<!-- smudged line — the "partial" tier fixture region -->
		<text x="150" y="278" font-size="22" filter="url(#smudge)">Sourdough Bread     $5.99</text>

		<!-- faint/washed-out line — the "low" tier fixture region (one engine misses it) -->
		<text x="150" y="324" font-size="22" opacity="0.32">Coffee Beans 12oz  $11.25</text>

		<text x="150" y="370" font-size="22">Eggs Dozen          $4.29</text>

		<line x1="150" y1="402" x2="650" y2="402" stroke="#c7c7c9" stroke-width="2" />

		<!-- total -->
		<text x="150" y="448" font-size="24" font-weight="700">TOTAL               $25.02</text>

		<!-- footer -->
		<text x="400" y="906" font-size="16" font-style="italic" text-anchor="middle" fill="#6e6e73">
			Thank you for shopping!
		</text>
	</g>
</svg>
